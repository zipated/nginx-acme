version: '3.3'
services:
  nginx:
    container_name: nginx
    image: yilee01/nginx-acme:latest
    restart: always
    network_mode: "host"
    volumes:
      - ./cert:/cert
      - ./conf.d:/etc/nginx/conf.d
      - ./nginx.conf:/etc/nginx/nginx.conf
    environment:
      - CF_Token_List=token1,token2
      - CF_Account_ID_List=账号1,账号2
      - DNS_List=dns_cf,dns_dp
      - DOMAIN_List=域名1,域名2
      - EMAIL=[邮箱]
