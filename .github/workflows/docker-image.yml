name: Build and Push Docker Image

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (x.x.x)'
        required: false
        default: ''

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version number
        id: extract_version
        run: |
          VERSION=""
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: No version specified. Please provide a version via workflow dispatch input or trigger via a Git Tag."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/386,linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ env.version }}
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
          build-args: |
            VERSION=${{ env.version }}

